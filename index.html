<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="飼料計算">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>🐄</text></svg>">
<title>1頭あたり 現物給餌量 計算ツール</title>
<style>
  :root{--bg:#f4f6f8;--card:#fff;--line:#d5dbe0;--ink:#1b2733;--muted:#6b7a89;
        --accent:#c0392b;--accent2:#2d6cdf;--hi:#fff7e6;--fix:#2d6cdf;--var:#1a7a4c}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;
       background:var(--bg);color:var(--ink);font-size:15px;line-height:1.4;-webkit-text-size-adjust:100%}
  header{background:#1b2733;color:#fff;padding:12px 16px}
  header h1{margin:0;font-size:16px;font-weight:700}
  .wrap{max-width:860px;margin:0 auto;padding:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
  .loadrow{display:flex;gap:8px;flex-wrap:wrap}
  .bigbtn{flex:1 1 150px;font-size:15px;font-weight:700;padding:13px 14px;border:none;border-radius:10px;
          background:var(--accent2);color:#fff;cursor:pointer}
  .bigbtn.img{background:var(--var)}
  .bigbtn:active{opacity:.85}
  .status{font-size:12.5px;color:var(--muted);margin-top:8px;min-height:1em}
  .status.ok{color:var(--var);font-weight:700} .status.err{color:var(--accent);font-weight:700}
  .drophint{font-size:11px;color:var(--muted);margin-top:6px}
  body.drag .card:first-child{outline:2px dashed var(--accent2);outline-offset:2px}
  .info{display:flex;flex-wrap:wrap;gap:8px}
  .f{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;padding:6px 10px;flex:1 1 150px;background:#fff}
  .f label{font-size:12px;color:var(--muted);white-space:nowrap}
  .f input{border:none;outline:none;font-size:15px;width:100%;min-width:50px;background:transparent}
  .datef{position:relative;cursor:pointer}
  .datef .dateval{font-size:15px;font-weight:700;white-space:nowrap}
  .datef .dateval.empty{color:var(--muted);font-weight:400}
  .datef input[type=date]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
  .f .dmi{font-weight:800;color:#9a6b00;white-space:nowrap}
  .seg{display:flex}
  .seg button{font-size:15px;font-weight:700;min-width:38px;padding:5px 0;border:1px solid var(--line);background:#fff;cursor:pointer}
  .seg button+button{border-left:none}
  .seg button:first-child{border-radius:7px 0 0 7px} .seg button:last-child{border-radius:0 7px 7px 0}
  .seg button.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .heads{display:flex;align-items:center;gap:10px}
  .heads .lab{font-size:12px;color:var(--muted)}
  .heads .big{font-size:32px;font-weight:800;color:var(--accent);min-width:70px;text-align:center}
  .stepbtn{font-size:22px;width:46px;height:46px;border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer}
  .stepbtn:active{background:#eef2f6}
  .rt{width:100%;border-collapse:collapse;table-layout:fixed}
  .rt col.cn{width:24%} .rt col.cq{width:19%}
  .rt th{background:#eef2f6;color:var(--muted);font-size:10.5px;font-weight:600;padding:5px 2px;text-align:right;border-bottom:1px solid var(--line)}
  .rt th:first-child{text-align:left;padding-left:8px}
  .rt td{padding:9px 3px;text-align:right;border-bottom:1px solid #eef1f4;font-size:14px;font-weight:700}
  .rt td.nm{text-align:left;font-size:12px;font-weight:700;line-height:1.12;
            border-left:4px solid var(--var);padding-left:7px;word-break:break-all}
  .rt tr.fix td.nm{border-left-color:var(--fix)}
  .rt td.ed{color:var(--accent2);cursor:pointer}
  .rt td.ed:active{background:#eef4ff}
  .rt td.ph{color:var(--accent)}
  .rt td.ro{color:#555;font-weight:600}
  .sum{display:flex;justify-content:space-between;gap:8px;background:#1b2733;color:#fff;
       border-radius:9px;padding:9px 12px;margin-top:8px;font-size:12.5px;font-weight:700;flex-wrap:wrap}
  .minibtn{font-size:12px;padding:4px 11px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer}
  .note{font-size:11.5px;color:var(--muted);margin-top:8px}
  #histList table{width:100%;border-collapse:collapse;font-size:12px}
  #histList td,#histList th{border:1px solid var(--line);padding:4px 6px;text-align:left}
  details summary{cursor:pointer;font-size:13px;color:var(--accent2);font-weight:700}
  .padwrap{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .padwrap.on{display:flex}
  .padbox{background:#fff;width:100%;max-width:430px;border-radius:18px 18px 0 0;padding:14px 14px calc(14px + env(safe-area-inset-bottom))}
  @media(min-width:480px){.padwrap{align-items:center}.padbox{border-radius:18px}}
  .padhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .padhead .t{font-weight:700;color:var(--accent2);font-size:14px}
  .padhead .x{border:none;background:none;font-size:22px;cursor:pointer;color:var(--muted)}
  .padcur{font-size:13px;color:var(--muted);margin-bottom:6px}
  .padcur b{color:var(--ink);font-size:16px}
  .paddisp{font-size:36px;font-weight:800;text-align:right;padding:10px 16px;background:#f4f6f8;
           border-radius:12px;margin-bottom:10px;min-height:60px;word-break:break-all}
  .paddisp .u{font-size:16px;color:var(--muted);margin-left:6px}
  .padgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .padgrid button{font-size:25px;font-weight:700;padding:17px 0;border:1px solid var(--line);background:#fff;border-radius:13px;cursor:pointer}
  .padgrid button:active{background:#eef2f6}
  .padgrid button.bk{color:var(--accent)}
  .padfoot{display:grid;grid-template-columns:1fr 1.4fr;gap:8px;margin-top:8px}
  .padfoot button{font-size:18px;font-weight:800;padding:15px 0;border-radius:13px;cursor:pointer}
  .padfoot .clr{background:#fff;border:1px solid var(--line)}
  .padfoot .ok{background:var(--accent2);color:#fff;border:none}
</style>
</head>
<body>
<header><h1>1頭あたり 現物給餌量 計算ツール</h1></header>

<div class="wrap">

  <div class="card">
    <div class="loadrow">
      <button class="bigbtn" onclick="document.getElementById('pdfInput').click()">📄 PDF読み込み</button>
      <button class="bigbtn img" onclick="document.getElementById('imgInput').click()">🖼 画像読み込み</button>
    </div>
    <input type="file" id="pdfInput" accept="application/pdf,.pdf" style="display:none">
    <input type="file" id="imgInput" accept="image/*" style="display:none">
    <div class="status" id="loadStatus"></div>
    <div class="drophint">※ PC は PDF をここにドラッグ&ドロップでも読み込めます。画像ボタンは「写真ライブラリ／ファイル」から選べます。</div>
  </div>

  <div class="card">
    <div class="info">
      <div class="f"><label>群</label><input id="i_group" placeholder="搾乳群"></div>
      <div class="f datef"><label>設計日</label><span class="dateval empty" id="dateDisplay">日付を選択</span><input id="i_date" type="date" aria-label="設計日"></div>
      <div class="f"><label>DMI</label><span class="dmi"><span id="o_dmi">—</span> kg</span></div>
      <div class="f"><label>給与回数</label><span class="seg" id="feedSeg"></span><input type="hidden" id="i_feed" value="2"></div>
    </div>
  </div>

  <div class="card">
    <div class="heads">
      <span class="lab">搾乳頭数</span>
      <button class="stepbtn" onclick="bump(-1)">−</button>
      <div class="big" id="nowLabel">120</div>
      <button class="stepbtn" onclick="bump(1)">＋</button>
    </div>
  </div>

  <div class="card">
    <table class="rt">
      <colgroup><col class="cn"><col class="cq"><col class="cq"><col class="cq"><col class="cq"></colgroup>
      <thead><tr>
        <th>原料</th><th>総量/日<br>kg</th><th>1回<br>kg</th><th>1頭/日<br>kg</th><th>乾物<br>kg</th>
      </tr></thead>
      <tbody id="ingBody"></tbody>
    </table>
    <div class="sum">
      <span>合計/日 <span id="o_totalday">—</span></span>
      <span>1回 <span id="o_totalfeed">—</span></span>
      <span>乾物(DMI) <span id="o_dmi2">—</span> kg</span>
    </div>
    <div class="note">総量・1回・1頭/日の数字をタップ → テンキーで入力 → 決定。1回を入れると 総量＝1回×給与回数。</div>
  </div>

  <div class="card">
    <details>
      <summary>履歴（過去の設計）</summary>
      <div style="margin-top:8px"><button class="minibtn" onclick="snapshotNow()">現在を履歴に保存</button></div>
      <div id="histList" style="margin-top:8px;font-size:12px;color:var(--muted)">履歴はまだありません。</div>
    </details>
  </div>

</div>

<div class="padwrap" id="pad" onclick="if(event.target===this)closePad()">
  <div class="padbox">
    <div class="padhead"><span class="t" id="padTitle"></span><button class="x" onclick="closePad()">✕</button></div>
    <div class="padcur">現在 <b id="padOrig">—</b> kg</div>
    <div class="paddisp"><span id="padDisp">0</span><span class="u">kg</span></div>
    <div class="padgrid">
      <button onclick="padKey('7')">7</button><button onclick="padKey('8')">8</button><button onclick="padKey('9')">9</button>
      <button onclick="padKey('4')">4</button><button onclick="padKey('5')">5</button><button onclick="padKey('6')">6</button>
      <button onclick="padKey('1')">1</button><button onclick="padKey('2')">2</button><button onclick="padKey('3')">3</button>
      <button onclick="padKey('.')">.</button><button onclick="padKey('0')">0</button><button class="bk" onclick="padKey('bk')">⌫</button>
    </div>
    <div class="padfoot">
      <button class="clr" onclick="padClear()">クリア</button>
      <button class="ok" onclick="padOK()">決定</button>
    </div>
  </div>
</div>

<script>
const DESIGN = [
  {jp:"圧ペンコーン",   total:360,  dm:86,   fixed:false},
  {jp:"マッシュコーン", total:720,  dm:86,   fixed:false},
  {jp:"配合",          total:480,  dm:88,   fixed:false},
  {jp:"大豆粕",        total:60,   dm:90,   fixed:false},
  {jp:"DDGs",         total:480,  dm:89,   fixed:false},
  {jp:"1番サイレージ",  total:3000, dm:21,   fixed:false},
  {jp:"油脂",          total:48,   dm:99.5, fixed:true},
  {jp:"プレミックス",   total:12,   dm:99.5, fixed:true},
  {jp:"酸化マグ",      total:6,    dm:99.5, fixed:true},
  {jp:"炭カル",        total:48,   dm:99.5, fixed:true},
  {jp:"重曹",          total:24,   dm:99.5, fixed:true},
  {jp:"オーツ",        total:600,  dm:90,   fixed:true},
  {jp:"加水",          total:1560, dm:0.05, fixed:true},
];
const DEFAULTS={group:"搾乳群",date:"",feed:"2",now:120};
let ITEMS = DESIGN.map(x=>({...x}));
let now=120;

const DISP={'圧ペンコーン':'圧ペン<br>コーン','マッシュコーン':'マッシュ<br>コーン',
  '1番サイレージ':'1番<br>サイレージ','2番サイレージ':'2番<br>サイレージ','プレミックス':'ミックス'};
function dispName(jp){return DISP[jp]||jp;}
const COLLAB={total:'総量/日',feed:'1回量',phday:'1頭/日'};

const NDS_MAP = [
  ["Nakanome Lactation Mix Omnigen","プレミックス",true],
  ["Dakota Gold DDGS","DDGs",false],
  ["Oat Hay","オーツ",true],
  ["Soybean Meal","大豆粕",false],
  ["Sodium Bicarbonate","重曹",true],
  ["Calcium Carbonate","炭カル",true],
  ["Magnesium Ox","酸化マグ",true],
  ["Palmit","油脂",true],
  ["Sin Multi","マッシュコーン",false],
  ["LC Mash","配合",false],
  ["MultiCorn","圧ペンコーン",false],
  ["Water","加水",true],
];
function mapName(en){
  if(/^J\s*GS2/i.test(en)) return {jp:"2番サイレージ",fixed:true};
  if(/^J\s*GS1/i.test(en)) return {jp:"1番サイレージ",fixed:false};
  for(const [k,jp,fx] of NDS_MAP){ if(en.toLowerCase().startsWith(k.toLowerCase())) return {jp,fixed:fx}; }
  return null;
}

const KEY='nds-feed-tool-v4', HKEY='nds-feed-history-v1';
function gv(id){return document.getElementById(id).value;}
function sv(id,v){document.getElementById(id).value=v;}
function formatDate(v){
  const m=(v||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m?`${m[1]}年${parseInt(m[2],10)}月${parseInt(m[3],10)}日`:'日付を選択';
}
function renderDate(){
  const v=gv('i_date'), el=document.getElementById('dateDisplay');
  el.textContent=formatDate(v); el.classList.toggle('empty',!v);
}
function setDate(v){
  document.getElementById('i_date').value=(v||'').replace(/\//g,'-');
  renderDate();
}
function save(){try{localStorage.setItem(KEY,JSON.stringify({
  items:ITEMS,now,group:gv('i_group'),date:gv('i_date'),feed:gv('i_feed')
}));}catch(e){}}
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(!s)return;
  if(Array.isArray(s.items)&&s.items.length)ITEMS=s.items.map(x=>({...x}));
  if(s.now)now=s.now;
  if(s.group!=null)sv('i_group',s.group); if(s.date!=null)setDate(s.date);
  if(s.feed!=null)sv('i_feed',s.feed);
}catch(e){}}

function loadHist(){try{return JSON.parse(localStorage.getItem(HKEY))||[]}catch(e){return[]}}
function saveHist(h){try{localStorage.setItem(HKEY,JSON.stringify(h))}catch(e){}}
function stamp(){const d=new Date(),p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function snapshot(reason){
  if(!ITEMS||!ITEMS.length) return;
  const h=loadHist();
  h.unshift({archivedAt:stamp(), reason:reason||'', designDate:gv('i_date'), group:gv('i_group'),
             feed:gv('i_feed'), now, items:ITEMS.map(x=>({...x}))});
  if(h.length>100) h.length=100;
  saveHist(h); renderHist();
}
function snapshotNow(){snapshot('手動保存'); setStatus('履歴に保存しました','ok');}
function renderHist(){
  const h=loadHist(), el=document.getElementById('histList');
  if(!h.length){el.innerHTML='履歴はまだありません。';return;}
  el.innerHTML='<table><tr><th>変更日</th><th>設計日</th><th>頭数</th><th></th></tr>'+
    h.map((s,i)=>`<tr><td>${s.archivedAt}<br><span style="color:#99a">${s.reason||''}</span></td>
      <td>${(s.designDate||'-').replace(/-/g,'/')}</td><td>${s.now}頭</td>
      <td style="white-space:nowrap"><button class="minibtn" onclick="restoreHist(${i})">戻す</button>
      <button class="minibtn" style="color:#c0392b" onclick="delHist(${i})">削除</button></td></tr>`).join('')+'</table>';
}
function restoreHist(i){const h=loadHist(),s=h[i];if(!s)return;
  snapshot('復元前の自動保存');
  ITEMS=s.items.map(x=>({...x})); now=s.now;
  sv('i_group',s.group||''); setDate(s.designDate||''); sv('i_feed',s.feed||'2');
  document.getElementById('nowLabel').textContent=now; save(); render();
  setStatus('履歴を復元しました（設計日 '+((s.designDate||'-').replace(/-/g,'/'))+'）','ok');}
function delHist(i){const h=loadHist();h.splice(i,1);saveHist(h);renderHist();}

const feed=()=>Math.max(1,parseFloat(gv('i_feed'))||2);
const num=n=>n.toLocaleString('ja-JP');
const kg=n=>num(Math.round(n*1000)/1000);
function bump(d){now=Math.max(1,now+d);document.getElementById('nowLabel').textContent=now;save();render();}
function setFeed(n){sv('i_feed',String(n));save();render();}
function renderFeedSeg(){
  const cur=feed();
  document.getElementById('feedSeg').innerHTML=[1,2,3].map(n=>
    `<button class="${n===cur?'on':''}" onclick="setFeed(${n})">${n}</button>`).join('');
}

function commitValue(i,col,v){
  const fd=feed(), x=ITEMS[i];
  if(col==='total') x.total=v;
  else if(col==='feed')  x.total=v*fd;
  else if(col==='phday') x.total=v*now;
  save(); render();
}

function render(){
  const fd=feed();
  let totalDay=0,dmSum=0,html='';
  ITEMS.forEach((x,i)=>{
    const phd=x.total/now, pfa=x.total/fd, dmh=phd*x.dm/100;
    totalDay+=x.total; dmSum+=dmh;
    const E=(col,val,cls)=>`<td class="ed ${cls||''}" data-i="${i}" data-col="${col}" onclick="openPad(this)">${val}</td>`;
    html+=`<tr class="${x.fixed?'fix':''}">
      <td class="nm">${dispName(x.jp)}</td>
      ${E('total',num(Math.round(x.total*1000)/1000))}
      ${E('feed',kg(pfa))}
      ${E('phday',kg(phd),'ph')}
      <td class="ro">${kg(dmh)}</td></tr>`;
  });
  document.getElementById('ingBody').innerHTML=html;
  document.getElementById('o_dmi').textContent=num(Math.round(dmSum*10)/10);
  document.getElementById('o_dmi2').textContent=num(Math.round(dmSum*100)/100);
  document.getElementById('o_totalday').textContent=num(Math.round(totalDay*10)/10)+' kg';
  document.getElementById('o_totalfeed').textContent=num(Math.round(totalDay/fd*10)/10)+' kg';
  renderFeedSeg();
}

// ===== 数値テンキー =====
let padCtx=null, padReplace=true;
function openPad(td){
  padCtx={i:+td.dataset.i, col:td.dataset.col};
  const cur=(td.textContent||'').replace(/[^\d.]/g,'')||'0';
  document.getElementById('padOrig').textContent=num(parseFloat(cur));  // 上部に現在値を常時表示
  document.getElementById('padDisp').textContent=cur;
  padReplace=true;
  document.getElementById('padTitle').textContent=`${ITEMS[padCtx.i].jp} ／ ${COLLAB[padCtx.col]}`;
  document.getElementById('pad').classList.add('on');
}
function closePad(){document.getElementById('pad').classList.remove('on');padCtx=null;}
function padKey(k){
  const el=document.getElementById('padDisp'); let s=el.textContent;
  if(k==='bk'){ s=s.slice(0,-1); if(s===''||s==='-')s='0'; padReplace=false; }
  else if(k==='.'){ if(padReplace){s='0.';padReplace=false;} else if(!s.includes('.')) s=s+'.'; }
  else { if(padReplace){ s=k; padReplace=false; } else { s=(s==='0'?k:s+k); } }
  el.textContent=s;
}
function padClear(){document.getElementById('padDisp').textContent='0';padReplace=false;}
function padOK(){
  if(padCtx){ const v=parseFloat(document.getElementById('padDisp').textContent);
    if(!isNaN(v)) commitValue(padCtx.i,padCtx.col,v); }
  closePad();
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('pad').classList.contains('on'))return;
  if(/^[0-9]$/.test(e.key)){padKey(e.key);e.preventDefault();}
  else if(e.key==='.'){padKey('.');e.preventDefault();}
  else if(e.key==='Backspace'){padKey('bk');e.preventDefault();}
  else if(e.key==='Enter'){padOK();e.preventDefault();}
  else if(e.key==='Escape'){closePad();e.preventDefault();}
});

// ===== 読み込み =====
function setStatus(msg,cls){const e=document.getElementById('loadStatus');e.textContent=msg;e.className='status'+(cls?' '+cls:'');}
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('読み込み失敗'));document.head.appendChild(s);});}
async function ensurePdfjs(){ if(window.pdfjsLib)return;
  await loadScript('https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js');
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';}
async function ensureTesseract(){ if(window.Tesseract)return;
  await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');}

function buildDesign(full, lineGetter){
  const mN=full.match(/n\s*=\s*(\d+)/i), mD=full.match(/(\d{8})/), mDmi=full.match(/([\d.]+)\s*DMI/i),
        mF=full.match(/feedings[:\s]*(\d+)/i), mFarm=full.match(/([A-Za-z][A-Za-z0-9'’.\-]*\s+Farm)\b/);
  const head=mN?parseInt(mN[1]):120;
  const date=mD?`${mD[1].slice(0,4)}-${mD[1].slice(4,6)}-${mD[1].slice(6,8)}`:'';
  const fd=mF?parseInt(mF[1]):2;
  const out=[];
  lineGetter().forEach(line=>{
    const s=line.replace(/\s+%/g,'%');
    const m=s.match(/^\s*([A-Za-z][A-Za-z0-9 .,\[\]\-']+?)\s+([\d.]+)%\s+([\d.]+)\b/);
    if(!m) return;
    const name=m[1].trim();
    if(/^TOTAL/i.test(name)||/^Ingredients/i.test(name)) return;
    const mp=mapName(name); if(!mp) return;
    out.push({jp:mp.jp, total:Math.round(parseFloat(m[3])*head*100)/100, dm:parseFloat(m[2]), fixed:mp.fixed});
  });
  return {date,dmi:mDmi?mDmi[1]:'',head,feed:fd,group:mFarm?mFarm[1]:'',items:out};
}
async function parsePDF(buf){
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const page=await pdf.getPage(1);
  const items=(await page.getTextContent()).items
    .map(it=>({s:(it.str||'').trim(),x:it.transform[4],y:it.transform[5]})).filter(it=>it.s!=='');
  const full=items.map(it=>it.s).join(' ');
  items.sort((a,b)=> b.y-a.y || a.x-b.x);
  const rows=[]; let anchor=null,cur=null;
  for(const it of items){ if(anchor===null||(anchor-it.y)>3){cur=[];rows.push(cur);anchor=it.y;} cur.push(it); }
  return buildDesign(full, ()=>rows.map(r=>r.map(t=>t.s).join(' ')));
}
function parseOCR(text){ return buildDesign(text, ()=>text.split(/\n/)); }

function applyDesign(d){
  if(!d.items||!d.items.length) throw new Error('原料を読み取れませんでした（PDF推奨）');
  snapshot('読み込みで上書き');
  ITEMS=d.items; now=d.head;
  sv('i_feed', String(d.feed));
  if(d.date) setDate(d.date);
  if(d.group) sv('i_group', d.group);
  document.getElementById('nowLabel').textContent=now;
  save(); render();
}
async function handlePDF(buf){
  setStatus('PDF解析中…'); await ensurePdfjs();
  const d=await parsePDF(buf); applyDesign(d);
  setStatus(`✓ 読込：${(d.date||'設計日不明').replace(/-/g,'/')} ／ ${d.head}頭 ／ ${d.items.length}原料`,'ok');
}
document.getElementById('pdfInput').addEventListener('change', async e=>{
  const f=e.target.files[0]; e.target.value=''; if(!f) return;
  try{ await handlePDF(await f.arrayBuffer()); }catch(err){ setStatus('✗ '+err.message,'err'); }
});
document.getElementById('imgInput').addEventListener('change', async e=>{
  const f=e.target.files[0]; e.target.value=''; if(!f) return;
  try{ setStatus('画像を解析中…（数十秒かかることがあります）'); await ensureTesseract();
    const w=await Tesseract.createWorker('eng');
    await w.setParameters({tessedit_pageseg_mode:'4'});
    const {data:{text}}=await w.recognize(f); await w.terminate();
    const d=parseOCR(text);
    if(d.items.length<5) throw new Error('原料表を十分に読み取れませんでした');
    applyDesign(d);
    setStatus(`✓ 画像読込：${(d.date||'設計日不明').replace(/-/g,'/')} ／ ${d.head}頭 ／ ${d.items.length}原料`,'ok');
  }catch(err){ setStatus('✗ 画像からは読み取りにくいです（'+err.message+'）。明るく正面から再撮影するか、PDF読込を推奨します。','err'); }
});
window.addEventListener('dragover',e=>{e.preventDefault();document.body.classList.add('drag');});
window.addEventListener('dragleave',e=>{if(e.relatedTarget===null)document.body.classList.remove('drag');});
window.addEventListener('drop', async e=>{
  e.preventDefault(); document.body.classList.remove('drag');
  const f=e.dataTransfer.files&&e.dataTransfer.files[0]; if(!f) return;
  try{
    if(/pdf$/i.test(f.name)||f.type==='application/pdf'){ await handlePDF(await f.arrayBuffer()); }
    else if(/^image\//.test(f.type)){ document.getElementById('imgInput').files=e.dataTransfer.files;
      document.getElementById('imgInput').dispatchEvent(new Event('change')); }
    else setStatus('PDFまたは画像をドロップしてください','err');
  }catch(err){ setStatus('✗ '+err.message,'err'); }
});

document.getElementById('i_group').addEventListener('input',()=>{save();});
document.getElementById('i_date').addEventListener('change',()=>{renderDate();save();});
load();
renderDate();
document.getElementById('nowLabel').textContent=now;
render(); renderHist();
</script>
